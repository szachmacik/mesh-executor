name: Deploy to Fly.io (DR)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['server.js', 'Dockerfile', 'fly.toml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Create app if not exists
        run: |
          flyctl apps list | grep mesh-executor-fly || flyctl apps create mesh-executor-fly --region fra
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        continue-on-error: true
      
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
